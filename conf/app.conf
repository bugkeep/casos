appname       = casos
httpport      = 9090
runmode       = dev

; -- Database ---------------------------------------------------------------
driverName    = mysql
dataSourceName= root:123456@tcp(localhost:3306)/
dbName        = casos

; -- Unified external gateway (proxy/ listens here, routes by path) ---------
; /k8s/* -> apiserver loopback
; /api/* -> beego (httpport above)
; /*     -> React static files (web/build/)
gatewayPort   = 9000

; -- Outbound proxy (optional) ----
socks5Proxy   = 127.0.0.1:10808

; -- Control plane ----------------------------------------------------------
apiserverPort = 6443
apiserverBind = 127.0.0.1
dataDir       = /var/lib/casos
